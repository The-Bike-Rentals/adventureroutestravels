name: Deploy Backend to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/backend-deploy.yml
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies (production)
        working-directory: backend
        run: npm ci --omit=dev

      - name: Remove local env file from deploy package
        run: rm -f backend/.env

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_ADV_RT_TRVLS_BACKEND }}
          slot-name: Production
          package: backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_ADV_RT_TRVLS_BACKEND }}
