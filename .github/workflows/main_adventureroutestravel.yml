name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/main_adventureroutestravel.yml
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject backend API URL into config.js
        run: |
          test -n "${{ secrets.ART_API_URL }}" || (echo "Missing repo variable: ART_API_URL" && exit 1)
          sed -i "s|__ART_API_URL__|${{ secrets.ART_API_URL }}|g" frontend/assets/js/config.js

      - name: Deploy to Azure Static Web Apps
        id: swa-deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.ADV_RT_TRVLS_FRONTEND_SWS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: ""