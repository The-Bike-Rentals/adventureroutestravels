# Docs for the Azure Static Web Apps Deploy action: https://github.com/Azure/static-web-apps-deploy

name: Build and deploy static app to Azure Static Web App - adventureroutestravel

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4

      - name: 'Deploy to Azure Static Web App'
        uses: Azure/static-web-apps-deploy@v1
        id: deploy-to-webapp
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_BUSH_0A19AAC00 }}
          action: 'upload'
          app_location: '.'
          output_location: '.'

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
